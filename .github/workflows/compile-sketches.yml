name: Compile sketches

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same ref when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - name: ESP32
            fqbn: esp32:esp32:esp32
            platform-name: esp32:esp32
            platform-source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json

          - name: ESP8266
            fqbn: esp8266:esp8266:generic
            platform-name: esp8266:esp8266
            platform-source-url: https://arduino.esp8266.com/stable/package_esp8266com_index.json

          - name: UNO_R4_WiFi
            fqbn: arduino:renesas_uno:unor4wifi
            platform-name: arduino:renesas_uno

          - name: STM32_F429ZI
            fqbn: STMicroelectronics:stm32:Nucleo_64:pnum=NUCLEO_F429ZI
            platform-name: STMicroelectronics:stm32
            platform-source-url: https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json

          - name: STM32_F103_BluePill
            fqbn: STMicroelectronics:stm32:GenF1:pnum=BLUEPILL_F103C8
            platform-name: STMicroelectronics:stm32
            platform-source-url: https://github.com/stm32duino/BoardManagerFiles/raw/main/package_stmicroelectronics_index.json

    steps:
      - uses: actions/checkout@v4

      - name: Compile all canonical sketches
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.board.fqbn }}
          libraries: |
            - source-path: ./
          platforms: |
            - name: "${{ matrix.board.platform-name }}"
              source-url: "${{ matrix.board.platform-source-url }}"
          sketch-paths: |
            - examples/io/00_hello_zsignals
            - examples/io/01_blink_led
            - examples/io/02_button_read
            - examples/io/03_button_debounce
            - examples/io/04_digital_input_output
            - examples/io/05_analog_read
            - examples/io/06_pwm_output
            - examples/io/07_multi_button_state
            - examples/connectivity/01_wifi_basic
            - examples/patterns/01_state_machine_led
            - examples/patterns/02_multi_zsignal_aggregator
            - examples/patterns/03_debounced_button_zsignal
            - examples/patterns/04_capability_matrix
          enable-deltas-report: true
          enable-warnings-report: true

  lint:
    name: arduino-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/arduino-lint-action@v2
        with:
          library-manager: submit
          compliance: specification

  esp32-extended:
    name: ESP32 (extended — ESP32-only features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile ESP32-only sketches (Modbus, Ethernet, 4G, Irrigation, OTA)
        uses: arduino/compile-sketches@v1
        with:
          fqbn: esp32:esp32:esp32
          libraries: |
            - source-path: ./
          platforms: |
            - name: esp32:esp32
              source-url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          sketch-paths: |
            - examples/communication/01_modbus_rtu_read_register
            - examples/communication/02_modbus_rtu_write_coil
            - examples/maintenance/01_ota_basic
            - examples/maintenance/02_diagnostics
            - examples/alarm/01_threshold_high
            - examples/alarm/02_threshold_range
            - examples/alarm/03_buzzer_alarm
            - examples/alarm/04_alarm_cooldown
            - examples/scheduling/01_simple_timer
            - examples/scheduling/02_daily_schedule
            - examples/scheduling/03_cron_pattern
            - examples/scheduling/04_countdown_action
          cli-compile-flags: |
            - --build-property=compiler.cpp.extra_flags=-DZENOPCB_ENABLE_ETHERNET -DZENOPCB_ENABLE_CELLULAR
