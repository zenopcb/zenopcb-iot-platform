sentence=Declarative IoT library for ESP32, ESP8266, UNO R4 WiFi and STM32 — WiFi provisioning, MQTT, OTA, Modbus, ZSignals, alarms, schedules and irrigation.
paragraph=Single-entry-point library for the ZenoPCB IoT platform. v0.4.0 introduces a declarative ZSignal API: DEVICE_TO_CLOUD / CLOUD_TO_DEVICE / ZENO_EVERY macros self-register at file scope, so the setup() chain stays a single `wifi().device().begin()` line. Provides WiFi captive-portal provisioning, MQTT (with optional TLS), HTTP OTA with rollback, Modbus RTU/TCP with register-polling and MQTT control, ZSignals (Z0..Z254) custom telemetry/control, edge alarm rules, schedule execution, irrigation scenarios, and diagnostics reporting. Vendors ArduinoJson, PubSubClient, TinyGSM, Preferences, FlashStorage and StreamDebugger so a single install is enough. Optional features are gated by build flags: ZENOPCB_ENABLE_TLS, ZENOPCB_ENABLE_ETHERNET, ZENOPCB_ENABLE_CELLULAR.
