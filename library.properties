sentence=Fluent IoT library for ESP32, ESP8266, UNO R4 WiFi and STM32 — WiFi provisioning, MQTT, OTA, Modbus, Z-Keys, alarms, schedules and irrigation.
paragraph=Single-entry-point library for the ZenoPCB IoT platform. Provides a fluent builder API (ZenoPCB::Zeno) for WiFi captive-portal provisioning, MQTT (with optional TLS), HTTP OTA with rollback, Modbus RTU/TCP with register-polling and MQTT control, Z-Key custom telemetry/control, edge alarm rules, schedule execution, irrigation scenarios, and diagnostics reporting. Vendors ArduinoJson, PubSubClient, TinyGSM, Preferences, FlashStorage and StreamDebugger so a single install is enough. Optional features are gated by build flags: ZENOPCB_ENABLE_TLS, ZENOPCB_ENABLE_ETHERNET, ZENOPCB_ENABLE_CELLULAR.
category=Communication
